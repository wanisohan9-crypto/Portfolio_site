<section id="contact" class="contact">
  <h2>Get In Touch</h2>
  <div class="contact-content">
    <form class="contact-form" (submit)="onSubmit($event)">
      <div class="form-group">
        <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <input type="email" [(ngModel)]="formData.email" name="email" placeholder="Your Email" required>
      </div>
      <div class="form-group">
        <textarea [(ngModel)]="formData.message" name="message" placeholder="Your Message" rows="5" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
    <div class="contact-info">
      <h3>Contact Information</h3>
      <p><strong>Email:</strong> wanisohan9@gmail.com</p>
      <p><strong>Phone:</strong> +91 8108119039</p>
      <p><strong>Location:</strong> Mumbai, India</p>
    </div>
  </div>
</section>
